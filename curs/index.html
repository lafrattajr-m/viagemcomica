<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Social Media Downloader - Baixe Vídeos e Fotos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff6b35;
            --secondary: #004e89;
            --accent: #f7931e;
            --success: #1db954;
            --dark: #0f0f0f;
            --light: #f5f5f5;
            --border: #e0e0e0;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text);
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 50px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 32px;
            color: var(--secondary);
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 30px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--secondary);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--light);
            border: 2px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }

        input[type="text"] {
            flex: 1;
            border: none;
            background: transparent;
            padding: 15px;
            font-size: 14px;
            outline: none;
        }

        .paste-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            margin-right: 5px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .paste-btn:hover {
            background: #ff5520;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 53, 0.3);
        }

        .paste-btn:active {
            transform: translateY(0);
        }

        .supported-networks {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .network-badge {
            background: var(--light);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s ease;
            cursor: default;
        }

        .network-badge:hover {
            border-color: var(--primary);
            background: rgba(255, 107, 53, 0.05);
        }

        .network-icon {
            font-size: 20px;
            margin-right: 5px;
        }

        .download-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .download-btn:before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.3s ease;
        }

        .download-btn:hover:before {
            left: 100%;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 107, 53, 0.4);
        }

        .download-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .download-btn.loading {
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .result {
            background: linear-gradient(135deg, #f0f4ff 0%, #fff0f5 100%);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            display: none;
            animation: slideDown 0.4s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result.show {
            display: block;
        }

        .result-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--secondary);
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .result-content {
            background: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.6;
            color: #555;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
        }

        .result-content code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--primary);
        }

        .status {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            font-weight: 500;
            color: #666;
        }

        .status.success {
            color: var(--success);
        }

        .status.error {
            color: #e74c3c;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #ccc;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .info-box {
            background: #e3f2fd;
            border-left: 4px solid var(--secondary);
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
            color: #1565c0;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .info-box strong {
            display: block;
            margin-bottom: 5px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
            }

            .supported-networks {
                grid-template-columns: 1fr;
            }

            .logo {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">📥</div>
            <h1>Social Downloader</h1>
            <p class="subtitle">Baixe vídeos e fotos de suas redes sociais favoritas</p>
        </div>

        <!-- Info Box -->
        <div class="info-box">
            <strong>📌 Informação Educativa</strong>
            Esta é uma demonstração de conceitos. Para uso em produção, você precisará das bibliotecas apropriadas para cada rede social.
        </div>

        <!-- Redes Suportadas -->
        <div class="supported-networks">
            <div class="network-badge">📱 Instagram</div>
            <div class="network-badge">🎵 TikTok</div>
            <div class="network-badge">🐦 Twitter/X</div>
            <div class="network-badge">▶️ YouTube</div>
        </div>

        <!-- Formulário -->
        <form id="downloadForm">
            <div class="input-group">
                <label for="urlInput">Insira a URL</label>
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="urlInput" 
                        placeholder="Ex: https://instagram.com/p/ABC123..."
                        required
                    >
                    <button type="button" class="paste-btn" onclick="pasteURL()">
                        📋 Colar
                    </button>
                </div>
            </div>

            <button type="submit" class="download-btn" id="downloadBtn">
                🚀 Analisar e Baixar
            </button>
        </form>

        <!-- Resultado -->
        <div class="result" id="result">
            <div class="result-title" id="resultTitle">Analisando...</div>
            <div class="result-content" id="resultContent"></div>
            <div class="status" id="status"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        // Colar URL da área de transferência
        async function pasteURL() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('urlInput').value = text;
                document.getElementById('urlInput').focus();
            } catch (err) {
                alert('Não foi possível acessar a área de transferência');
            }
        }

        // Enviar formulário
        document.getElementById('downloadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const url = document.getElementById('urlInput').value.trim();
            if (!url) {
                alert('Por favor, insira uma URL');
                return;
            }

            await analyzeAndDownload(url);
        });

        // Analisar URL e simular download
        async function analyzeAndDownload(url) {
            const resultDiv = document.getElementById('result');
            const resultTitle = document.getElementById('resultTitle');
            const resultContent = document.getElementById('resultContent');
            const status = document.getElementById('status');
            const downloadBtn = document.getElementById('downloadBtn');

            // Mostrar carregamento
            resultDiv.classList.add('show');
            resultTitle.textContent = '⏳ Analisando URL...';
            resultContent.innerHTML = '<div class="spinner"></div> Processando...';
            status.textContent = '';
            downloadBtn.disabled = true;
            downloadBtn.classList.add('loading');

            try {
                // Requisição para analisar
                const analyzeResponse = await fetch(`${API_URL}/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });

                const analyzeData = await analyzeResponse.json();

                // Requisição para download
                const downloadResponse = await fetch(`${API_URL}/download`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });

                const downloadData = await downloadResponse.json();

                // Mostrar resultado
                resultTitle.textContent = '✅ Análise Concluída';
                resultContent.innerHTML = `
                    <strong>Rede Social Detectada:</strong> ${analyzeData.type || 'Desconhecida'}<br><br>
                    <strong>Dados Extraídos:</strong><br>
                    <code>${JSON.stringify(analyzeData, null, 2)}</code><br><br>
                    <strong>Próximos Passos:</strong><br>
                    ${downloadData.instructions}
                `;
                status.textContent = '✨ Pronto para download!';
                status.classList.add('success');

            } catch (error) {
                resultTitle.textContent = '❌ Erro na Análise';
                resultContent.innerHTML = `
                    <strong>Erro:</strong> ${error.message}<br><br>
                    <strong>Dica:</strong> Certifique-se de que o servidor Flask está rodando em http://localhost:5000
                `;
                status.textContent = 'Erro ao conectar com o servidor';
                status.classList.add('error');
            } finally {
                downloadBtn.disabled = false;
                downloadBtn.classList.remove('loading');
            }
        }
    </script>
</body>
</html>
